services:
  postgres:
    image: postgres:16-alpine
    container_name: camerarental-pg
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: camerarental_dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: camerarental-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
